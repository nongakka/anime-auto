name: Daily Update

permissions:
  contents: write

on:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci

      # 🔥 รันทีละหมวดแบบปลอดภัย
      - name: Run Scrapers
        run: |
          node update5.js thai
          node update5.js subthai
          node update5.js china
          node update5.js thai2
          node update5.js movie
          node update5.js end
          node update5.js noend

      # ✅ Commit เฉพาะ data เท่านั้น
      - name: Commit & Push if changed
        run: |
          git config --global user.name "auto-bot"
          git config --global user.email "auto@bot.com"

          git add data/*.json

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto daily update"
            git pull --rebase origin main
            git push
          fi
