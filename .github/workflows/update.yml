name: Daily Update

on:
  schedule:
    - cron: '0 19 * * *'   # 02:00 เวลาไทย (UTC+7)
  workflow_dispatch:       # กดรันเองได้

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Run Scraper
        run: |
          node ubdate.js thai
          node ubdate.js subthai
          node ubdate.js china
          node ubdate.js thai2
          node ubdate.js movie
          node ubdate.js end
          node ubdate.js noend
      
      - name: Commit if changed
        run: |
          git config --global user.name "auto-bot"
          git config --global user.email "auto@bot.com"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto update"
          git push
