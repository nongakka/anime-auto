name: Daily Update

permissions:
  contents: write
  actions: write   # 👈 เพิ่มบรรทัดนี้

on:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci

      # 🔥 รัน scraper + ตรวจสถานะ
      - name: Run Scrapers
        id: scraper_step   # 👈 เพิ่ม id
        run: |
          node update5.js thai > output.txt
          cat output.txt

          if grep -q "SCRAPER_STATUS:IN_PROGRESS" output.txt; then
            echo "continue=true" >> $GITHUB_OUTPUT
          else
            echo "continue=false" >> $GITHUB_OUTPUT
          fi

      # ✅ Commit เฉพาะ data เท่านั้น
      - name: Commit & Push if changed
        run: |
          git config --global user.name "auto-bot"
          git config --global user.email "auto@bot.com"

          git add data/*.json

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto daily update"
            git pull --rebase origin main
            git push
          fi

      # 🚀 ยิงรันต่อ ถ้ายังไม่จบหมวด
      - name: Trigger Next Run
        if: steps.scraper_step.outputs.continue == 'true'
        run: |
          gh workflow run "Daily Update"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
