name: Daily Update

permissions:
  contents: write

on:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4   # 🔥 ใช้ v4
        with:
          fetch-depth: 0           # 🔥 ดึง repo เต็ม

      - name: Debug list files     # 🔥 เช็คว่ามี package.json ไหม
        run: ls -la

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run Scraper
        run: |
          node update.js thai
          node update.js subthai
          node update.js china
          node update.js thai2
          node update.js movie
          node update.js end
          node update.js noend

      - name: Commit if changed
        run: |
          git config --global user.name "auto-bot"
          git config --global user.email "auto@bot.com"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto update"
          git push
