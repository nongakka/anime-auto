name: Daily Update

permissions:
  contents: write

on:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:

# 🔒 ป้องกันรันซ้อนกันเอง
concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      max-parallel: 2   # 🔥 จำกัดรันพร้อมกันแค่ 2 หมวด
      matrix:
        category: [thai, subthai, china, thai2, movie, end, noend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run Scraper
        run: node update.js ${{ matrix.category }}

      - name: Commit if changed
        run: |
          git config --global user.name "auto-bot"
          git config --global user.email "auto@bot.com"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto update ${{ matrix.category }}"
          git push
