<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Anime Multi Category</title>
<style>
body { background:#111; color:#fff; font-family:Arial; }
select { padding:8px; margin:15px 0; }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:15px; }
.card { background:#222; padding:10px; border-radius:8px; }
.card img { width:100%; height:260px; object-fit:cover; }
a { color:white; text-decoration:none; }
</style>
</head>
<body>

<h1>Anime หลายหมวด</h1>

<select id="categorySelect"></select>
<div class="grid" id="grid"></div>

<script>

let categories = [];

async function loadCategories() {
  const res = await fetch("categories.json");
  categories = await res.json();

  const select = document.getElementById("categorySelect");

  categories.forEach(cat => {
    select.innerHTML += `<option value="${cat.slug}">${cat.name}</option>`;
  });

  select.addEventListener("change", () => loadMovies(select.value));

  loadMovies(categories[0].slug);
}

async function loadMovies(slug) {

  const res = await fetch(`data/${slug}.json`);
  const data = await res.json();

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  data.forEach(movie => {

    grid.innerHTML += `
      <div class="card">
        <a href="${movie.link}" target="_blank">
          <img src="${movie.image}">
          <h3>${movie.title}</h3>
          <p>${movie.episodes.length} ตอน</p>
        </a>
      </div>
    `;
  });
}

loadCategories();

</script>

</body>
</html>
